
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1.5rem;
  gap: 1.25rem;
  min-height: 560px;
  position: relative;
}
.activity-input {
  width: 100%;
  max-width: 440px;
  font-size: 18px;
  font-weight: 500;
  text-align: center;
  padding: 10px 16px;
  border-radius: var(--radius);
  border: 0.5px solid var(--border-strong);
  background: var(--surface-1);
  color: var(--text-primary);
  font-family: var(--font-sans);
  outline: none;
  transition: border-color 0.15s;
}
.activity-input:focus { border-color: var(--border-accent); }
.activity-input::placeholder { color: var(--text-muted); font-weight: 400; }

.minute-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  max-width: 480px;
}
.min-btn {
  font-size: 13px;
  min-width: 44px;
  padding: 6px 10px;
  border-radius: var(--radius);
  border: 0.5px solid var(--border-strong);
  background: var(--surface-1);
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  font-family: var(--font-sans);
}
.min-btn:hover { background: var(--surface-2); color: var(--text-primary); }
.min-btn.active {
  background: var(--bg-accent);
  color: var(--text-accent);
  border-color: var(--border-accent);
}
.section-label {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  align-self: flex-start;
  margin-left: calc(50% - 220px);
}

.timer-display {
  font-size: 88px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  letter-spacing: -2px;
  color: var(--text-primary);
  transition: color 0.3s;
}
.timer-display.warning { color: var(--text-warning); }
.timer-display.danger { color: var(--text-danger); }

.progress-track {
  width: 90%;
  max-width: 440px;
  height: 6px;
  background: var(--surface-1);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  border-radius: 99px;
  background: var(--fill-accent);
  transition: width 0.6s linear, background 0.3s;
}
.progress-bar.warning { background: var(--fill-warning); }
.progress-bar.danger { background: var(--fill-danger); }

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.ctrl-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  padding: 10px 22px;
  border-radius: var(--radius);
  border: 0.5px solid var(--border-strong);
  background: transparent;
  color: var(--text-primary);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: background 0.12s, transform 0.1s;
}
.ctrl-btn:hover { background: var(--surface-1); }
.ctrl-btn:active { transform: scale(0.97); }
.ctrl-btn.start {
  background: var(--fill-accent);
  color: white;
  border-color: var(--fill-accent);
}
.ctrl-btn.start:hover { background: var(--fill-accent-hover); }
.ctrl-btn.pause {
  background: var(--bg-warning);
  color: var(--text-warning);
  border-color: var(--border-warning);
}
.ctrl-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
}

.sound-row {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
}
.sound-row input { cursor: pointer; }

.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.6);
  border-radius: 12px;
  gap: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.overlay-title { font-size: 52px; font-weight: 500; color: #fff; }
.overlay-activity { font-size: 22px; color: rgba(255,255,255,0.8); }
.overlay-sub { font-size: 16px; color: rgba(255,255,255,0.6); }
.dismiss-btn {
  margin-top: 6px;
  padding: 10px 28px;
  border-radius: var(--radius);
  border: 1.5px solid rgba(255,255,255,0.4);
  background: transparent;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: background 0.15s;
}
.dismiss-btn:hover { background: rgba(255,255,255,0.15); }
</style>

<div style="position:relative; border-radius:12px; overflow:hidden;">
  <div class="wrap" id="mainWrap">
    <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">교실용 퀴즈 타이머</h2>

    <span class="section-label">활동명</span>
    <input class="activity-input" id="activityInput" type="text" placeholder="활동명을 입력하세요 (예: 1번 문제 풀기)" maxlength="40" />

    <span class="section-label">시간 설정</span>
    <div class="minute-row" id="minuteRow"></div>

    <div class="timer-display" id="display">01:00</div>

    <div class="progress-track">
      <div class="progress-bar" id="progressBar" style="width:100%"></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn start" id="startBtn" onclick="startTimer()">
        <i class="ti ti-player-play" aria-hidden="true"></i> 시작
      </button>
      <button class="ctrl-btn pause" id="pauseBtn" onclick="pauseTimer()" disabled>
        <i class="ti ti-player-pause" aria-hidden="true"></i> 일시정지
      </button>
      <button class="ctrl-btn" id="resetBtn" onclick="resetTimer()">
        <i class="ti ti-refresh" aria-hidden="true"></i> 초기화
      </button>
    </div>

    <label class="sound-row">
      <input type="checkbox" id="soundCheck" checked />
      <span>종료 알림음</span>
    </label>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-title">⏰ 시간 종료!</div>
    <div class="overlay-activity" id="overlayActivity"></div>
    <div class="overlay-sub">활동이 끝났습니다</div>
    <button class="dismiss-btn" onclick="dismiss()">닫고 초기화</button>
  </div>
</div>

<script>
const MINUTES = Array.from({length: 20}, (_, i) => i + 1);
let selectedMin = 1;
let totalSeconds = 60;
let remaining = 60;
let interval = null;
let running = false;

const display = document.getElementById('display');
const progressBar = document.getElementById('progressBar');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const overlay = document.getElementById('overlay');
const overlayActivity = document.getElementById('overlayActivity');
const soundCheck = document.getElementById('soundCheck');
const minuteRow = document.getElementById('minuteRow');

MINUTES.forEach(m => {
  const btn = document.createElement('button');
  btn.className = 'min-btn' + (m === 1 ? ' active' : '');
  btn.textContent = m + '분';
  btn.onclick = () => selectMinute(m);
  minuteRow.appendChild(btn);
});

function selectMinute(m) {
  if (running) return;
  selectedMin = m;
  totalSeconds = m * 60;
  remaining = totalSeconds;
  document.querySelectorAll('.min-btn').forEach((b, i) => {
    b.classList.toggle('active', MINUTES[i] === m);
  });
  updateDisplay();
}

function pad(n) { return String(n).padStart(2, '0'); }
function fmt(s) { return pad(Math.floor(s / 60)) + ':' + pad(s % 60); }

function updateDisplay() {
  display.textContent = fmt(remaining);
  const pct = totalSeconds > 0 ? (remaining / totalSeconds) * 100 : 0;
  progressBar.style.width = pct + '%';
  const ratio = remaining / totalSeconds;
  if (ratio <= 0.1 || remaining <= 10) {
    display.className = 'timer-display danger';
    progressBar.className = 'progress-bar danger';
  } else if (ratio <= 0.25) {
    display.className = 'timer-display warning';
    progressBar.className = 'progress-bar warning';
  } else {
    display.className = 'timer-display';
    progressBar.className = 'progress-bar';
  }
}

function startTimer() {
  if (running) return;
  if (remaining <= 0) resetTimer();
  running = true;
  startBtn.disabled = true;
  pauseBtn.disabled = false;
  interval = setInterval(() => {
    remaining--;
    updateDisplay();
    if (remaining <= 0) {
      clearInterval(interval);
      running = false;
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      playBeep();
      const name = document.getElementById('activityInput').value.trim();
      overlayActivity.textContent = name ? '「' + name + '」' : '';
      overlay.classList.add('show');
    }
  }, 1000);
}

function pauseTimer() {
  if (!running) return;
  clearInterval(interval);
  running = false;
  startBtn.disabled = false;
  pauseBtn.disabled = true;
}

function resetTimer() {
  clearInterval(interval);
  running = false;
  remaining = totalSeconds;
  startBtn.disabled = false;
  pauseBtn.disabled = true;
  overlay.classList.remove('show');
  updateDisplay();
}

function dismiss() {
  overlay.classList.remove('show');
  resetTimer();
}

function playBeep() {
  if (!soundCheck.checked) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const beeps = [
      { freq: 880, start: 0 },
      { freq: 880, start: 0.35 },
      { freq: 1320, start: 0.7 }
    ];
    beeps.forEach(({ freq, start }) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.45, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + 0.3);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + 0.35);
    });
  } catch(e) {}
}

updateDisplay();
</script>
